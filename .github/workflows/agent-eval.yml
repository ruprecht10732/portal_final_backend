name: Agent Trajectory Evaluation

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  eval:
    name: Trajectory F1 Evaluation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Run Trajectory Eval Harness
        run: go test -v ./internal/leads/agent/eval
        env:
          GO_ENV: test
