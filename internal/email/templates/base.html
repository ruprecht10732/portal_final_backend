{{define "email"}}
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{{.Title}}</title>
  <style>
    /* Standard CSS resets */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    
    body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      background-color: #f3f3f3;
      font-family: 'Arial Black', Gadget, sans-serif;
    }

    /* Logic to fix CSS linter for MSO properties */
    table { border-collapse: collapse !important; }
    
    .wrapper { background-color: #f3f3f3; padding: 40px 10px; }
    .main-card {
      background-color: #ffffff;
      border: 6px solid #000000;
      box-shadow: 14px 14px 0px 0px #000000;
    }
    .header-section {
      background-color: #00ffff;
      border-bottom: 6px solid #000000;
      padding: 30px;
    }
    .hero-text {
      font-size: 40px;
      line-height: 1.1;
      color: #000000;
      text-transform: uppercase;
      margin: 0;
      font-weight: 900;
    }
    .body-content {
      padding: 40px;
      color: #000000;
      line-height: 1.5;
      font-size: 18px;
      font-family: Helvetica, Arial, sans-serif;
    }
    .button-brutal {
      background-color: #ff00ff;
      border: 4px solid #000000;
      color: #000000 !important;
      display: inline-block;
      font-size: 18px;
      font-weight: 900;
      padding: 15px 25px;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 6px 6px 0px 0px #000000;
    }
    .mono { font-family: ui-monospace, 'Cascadia Code', monospace; font-weight: bold; }
    .link-alt { font-size: 12px; text-transform: uppercase; margin-top: 20px; word-break: break-all; }

    @media screen and (max-width: 600px) {
      .hero-text { font-size: 32px !important; }
      .main-card { box-shadow: 8px 8px 0px 0px #000000 !important; }
    }
  </style>

  </head>
<body>
  <div class="wrapper">
    <table role="presentation" style="margin: 0 auto; width: 100%; max-width: 600px; border-spacing: 0; border-collapse: collapse;">
      <tr>
        <td class="main-card">
          
          <table role="presentation" style="width: 100%; border-spacing: 0; border-collapse: collapse;">
            <tr>
              <td class="header-section">
                <h1 class="hero-text">{{.Heading}}</h1>
                {{if .Subheading}}
                <div class="mono" style="margin-top: 15px; font-size: 16px;">
                  {{.Subheading}}
                </div>
                {{end}}
              </td>
            </tr>
          </table>

          <table role="presentation" style="width: 100%; border-spacing: 0; border-collapse: collapse;">
            <tr>
              <td class="body-content">
                {{template "content" .}}

                {{if and .CTAURL .CTALabel}}
                <table role="presentation" style="width: 100%; margin-top: 30px; border-spacing: 0; border-collapse: collapse;">
                  <tr>
                    <td>
                      <a href="{{.CTAURL}}" class="button-brutal">{{.CTALabel}}</a>
                    </td>
                  </tr>
                </table>
                {{end}}
              </td>
            </tr>
          </table>
        </td>
      </tr>

      {{if .CTAURL}}
      <tr>
        <td class="body-content link-alt mono">
          Werkt de knop niet? Kopieer deze link:<br />
          <a href="{{.CTAURL}}" style="color: #000; text-decoration: underline;">{{.CTAURL}}</a>
        </td>
      </tr>
      {{end}}
    </table>

    </div>
</body>
</html>
{{end}}
